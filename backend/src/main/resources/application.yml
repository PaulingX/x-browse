server:
  port: ${XBROWSE_PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: x-browse
  datasource:
    url: jdbc:sqlite:${XBROWSE_DATA_DIR:./data}/xbrowse.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
  web:
    resources:
      static-locations: classpath:/static/,file:/app/static/

# x-browse 配置
xbrowse:
  data-dir: ${XBROWSE_DATA_DIR:./data}
  cache-dir: ${XBROWSE_CACHE_DIR:./data/cache}
  log-dir: ${XBROWSE_LOG_DIR:./logs}
  thumbnail-enabled: ${XBROWSE_THUMBNAIL_ENABLED:true}
  # 列表缩略图最大边长
  thumbnail-max-width: ${XBROWSE_THUMBNAIL_MAX_WIDTH:200}
  # 浏览器缓存图片秒数（proxy / thumbnail）
  image-cache-seconds: ${XBROWSE_IMAGE_CACHE_SECONDS:86400}
  # 是否缓存 proxy 原图到本地（大图慎开）
  proxy-cache-enabled: ${XBROWSE_PROXY_CACHE_ENABLED:false}
  jwt-secret: ${XBROWSE_JWT_SECRET:gbkqbkXWx1PuwHyB7QYkNZYEVR51zMLz}
  jwt-expiration: ${XBROWSE_JWT_EXPIRATION:604800}

logging:
  level:
    root: INFO
