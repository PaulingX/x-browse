server:
  port: ${XBROWSE_PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: x-browse
  datasource:
    url: jdbc:sqlite:${XBROWSE_DATA_DIR:./data}/xbrowse.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
  web:
    resources:
      static-locations: classpath:/static/,file:/app/static/

# x-browse 配置
xbrowse:
  data-dir: ${XBROWSE_DATA_DIR:./data}
  cache-dir: ${XBROWSE_CACHE_DIR:./data/cache}
  log-dir: ${XBROWSE_LOG_DIR:./logs}
  # 同步时：原图 > 500KB 生成 WebP 缩略图（不缩放，只压体积）
  thumbnail-enabled: ${XBROWSE_THUMBNAIL_ENABLED:true}
  # 小于等于该字节数不生成缩略图（默认 500KB = 512000）
  thumbnail-min-source-bytes: ${XBROWSE_THUMBNAIL_MIN_SOURCE_BYTES:512000}
  # 是否忽略以 . 开头的文件夹
  ignore-dot-dirs: ${XBROWSE_IGNORE_DOT_DIRS:true}
  # 忽略入库的文件后缀（逗号分隔，不含点）
  ignore-file-extensions: ${XBROWSE_IGNORE_FILE_EXTENSIONS:nfo,url,db,tmp,log,ini}
  # 浏览器缓存图片秒数（proxy / thumbnail 响应头）
  image-cache-seconds: ${XBROWSE_IMAGE_CACHE_SECONDS:86400}
  jwt-secret: ${XBROWSE_JWT_SECRET:gbkqbkXWx1PuwHyB7QYkNZYEVR51zMLz}
  jwt-expiration: ${XBROWSE_JWT_EXPIRATION:604800}

logging:
  level:
    root: INFO
